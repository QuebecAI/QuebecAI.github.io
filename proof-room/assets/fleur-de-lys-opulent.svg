<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Premium gold fleur-de-lys seal">
  <defs>
    <radialGradient id="aura" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#ffeaa3" stop-opacity=".70"/>
      <stop offset="42%" stop-color="#d7a84a" stop-opacity=".20"/>
      <stop offset="100%" stop-color="#001028" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8d8"/>
      <stop offset="16%" stop-color="#ffe88c"/>
      <stop offset="38%" stop-color="#d99c35"/>
      <stop offset="62%" stop-color="#fff1a7"/>
      <stop offset="78%" stop-color="#b36a16"/>
      <stop offset="100%" stop-color="#ffe6a3"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff0a8"/>
      <stop offset=".45" stop-color="#c8892e"/>
      <stop offset="1" stop-color="#704006"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 0.76 0 0 0.62  0 0 0.23 0 0.08  0 0 0 0.75 0" result="warm"/>
      <feMerge><feMergeNode in="warm"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity=".55"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#ffd36b" flood-opacity=".22"/>
    </filter>
    <path id="star" d="M0,-10 L2.2,-2.2 L10,0 L2.2,2.2 L0,10 L-2.2,2.2 L-10,0 L-2.2,-2.2Z"/>
  </defs>
  <rect width="220" height="220" fill="none"/>
  <circle cx="110" cy="110" r="98" fill="url(#aura)"/>
  <g fill="url(#gold)" opacity=".98" filter="url(#glow)">
    <use href="#star" transform="translate(110 21) scale(.9)"/>
    <use href="#star" transform="translate(35 80) scale(.62)"/>
    <use href="#star" transform="translate(185 80) scale(.62)"/>
    <use href="#star" transform="translate(53 166) scale(.50)"/>
    <use href="#star" transform="translate(167 166) scale(.50)"/>
    <use href="#star" transform="translate(110 195) scale(.62)"/>
  </g>
  <g filter="url(#shadow)">
    <circle cx="110" cy="110" r="72" fill="#07182b" fill-opacity=".52" stroke="url(#edge)" stroke-width="2"/>
    <circle cx="110" cy="110" r="58" fill="none" stroke="#f5cb6b" stroke-width="1" opacity=".60"/>
    <text x="110" y="151" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="140" font-weight="700" fill="url(#gold)" stroke="#7a4308" stroke-width="1.7" paint-order="stroke fill">⚜</text>
    <path d="M67 159 C87 170,133 170,153 159" fill="none" stroke="url(#gold)" stroke-width="2" opacity=".9"/>
  </g>
</svg>
